spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5433/hrplatform
    username: hruser
    password: hrpassword
    driver-class-name: org.postgresql.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

server:
  port: 8080
