version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hrplatform
      POSTGRES_USER: hruser
      POSTGRES_PASSWORD: hrpassword
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'

volumes:
  postgres_data:
